services:
  - type: web
    name: punkit-portfolio
    runtime: static
    repo: https://github.com/Punkitkumar/portfolio.git
    branch: master
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Set this in the Render dashboard after creating a GA4 property
      - key: VITE_GA_MEASUREMENT_ID
        sync: false

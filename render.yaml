services:
  - type: web
    name: punkit-portfolio
    runtime: node
    repo: https://github.com/Punkitkumar/portfolio.git
    branch: master
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: VISITORS_PASS
        sync: false
      - key: VITE_GA_MEASUREMENT_ID
        sync: false
